<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Vector Visualizer</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --grid: #374151;
      --axis: #e5e7eb;
      --unit: #22c55e;
      --a: #60a5fa;
      --b: #f97316;
      --selected: #facc15;
      --contour: #e879f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: radial-gradient(circle at top, #1f2937, var(--bg));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      text-align: center;
      max-width: 900px;
      padding: 0 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2.25rem);
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .app {
      width: min(60vw, 1280px);
      min-width: 640px;
      aspect-ratio: 4 / 3;
      background: var(--panel);
      border: 1px solid #4b5563;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 12px;
      background: #030712;
      cursor: crosshair;
    }

    .info {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0 16px;
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    @media (max-width: 760px) {
      .app {
        width: 96vw;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>2D Vector Visualizer</h1>
    <p>
      Move your mouse to rotate the green vector u with magnitude √2. Click vector <b>a</b> or <b>b</b>,
      then click anywhere on the plane to move its endpoint.
    </p>
  </header>

  <main class="app">
    <canvas id="canvas"></canvas>
  </main>

  <section class="info">
    <span class="badge"><span class="dot" style="background: var(--unit)"></span> Mouse vector u, |u| = √2</span>
    <span class="badge"><span class="dot" style="background: var(--a)"></span> Vector a</span>
    <span class="badge"><span class="dot" style="background: var(--b)"></span> Vector b</span>
    <span class="badge"><span class="dot" style="background: var(--contour)"></span> Average dot-product contour</span>
    <span class="badge" id="status">Selected: none</span>
  </section>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const vectors = {
      a: { x: 3, y: 2, color: getCss("--a"), label: "a" },
      b: { x: -2.5, y: 1.5, color: getCss("--b"), label: "b" }
    };

    let selectedVector = null;
    let mousePlane = { x: 1, y: 0 };
    let dpr = window.devicePixelRatio || 1;
    let origin = { x: 0, y: 0 };
    let scale = 60;

    function getCss(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      origin = { x: rect.width / 2, y: rect.height / 2 };
      scale = Math.min(rect.width, rect.height) / 10;
      draw();
    }

    function planeToScreen(p) {
      return {
        x: origin.x + p.x * scale,
        y: origin.y - p.y * scale
      };
    }

    function screenToPlane(s) {
      return {
        x: (s.x - origin.x) / scale,
        y: (origin.y - s.y) / scale
      };
    }

    function getMousePosition(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function drawGrid() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      ctx.clearRect(0, 0, width, height);

      ctx.lineWidth = 1;
      ctx.strokeStyle = getCss("--grid");

      const minX = Math.floor(-origin.x / scale) - 1;
      const maxX = Math.ceil((width - origin.x) / scale) + 1;
      const minY = Math.floor(-(height - origin.y) / scale) - 1;
      const maxY = Math.ceil(origin.y / scale) + 1;

      ctx.beginPath();

      for (let x = minX; x <= maxX; x++) {
        const sx = planeToScreen({ x, y: 0 }).x;
        ctx.moveTo(sx, 0);
        ctx.lineTo(sx, height);
      }

      for (let y = minY; y <= maxY; y++) {
        const sy = planeToScreen({ x: 0, y }).y;
        ctx.moveTo(0, sy);
        ctx.lineTo(width, sy);
      }

      ctx.stroke();

      ctx.strokeStyle = getCss("--axis");
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, origin.y);
      ctx.lineTo(width, origin.y);
      ctx.moveTo(origin.x, 0);
      ctx.lineTo(origin.x, height);
      ctx.stroke();

      drawAxisLabels(minX, maxX, minY, maxY);
    }

    function drawAxisLabels(minX, maxX, minY, maxY) {
      ctx.fillStyle = getCss("--muted");
      ctx.font = "12px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      for (let x = minX; x <= maxX; x++) {
        if (x === 0) continue;
        const sx = planeToScreen({ x, y: 0 }).x;
        ctx.fillText(x, sx, origin.y + 6);
      }

      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      for (let y = minY; y <= maxY; y++) {
        if (y === 0) continue;
        const sy = planeToScreen({ x: 0, y }).y;
        ctx.fillText(y, origin.x + 6, sy);
      }

      ctx.fillText("0", origin.x + 6, origin.y + 14);
    }

    function drawArrow(start, end, color, label, selected = false) {
      const s = planeToScreen(start);
      const e = planeToScreen(end);

      const angle = Math.atan2(e.y - s.y, e.x - s.x);
      const headLength = 14;

      ctx.strokeStyle = selected ? getCss("--selected") : color;
      ctx.fillStyle = selected ? getCss("--selected") : color;
      ctx.lineWidth = selected ? 4 : 3;

      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(e.x, e.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(e.x, e.y);
      ctx.lineTo(
        e.x - headLength * Math.cos(angle - Math.PI / 6),
        e.y - headLength * Math.sin(angle - Math.PI / 6)
      );
      ctx.lineTo(
        e.x - headLength * Math.cos(angle + Math.PI / 6),
        e.y - headLength * Math.sin(angle + Math.PI / 6)
      );
      ctx.closePath();
      ctx.fill();

      ctx.font = "bold 18px system-ui";
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      ctx.fillText(label, e.x + 8, e.y - 8);

      ctx.beginPath();
      ctx.arc(e.x, e.y, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawAverageDotContour(u, avgDot) {
      // Draw exact contour for all vectors v where u·v = avgDot.
      // Since |u| = sqrt(2), the closest point on the line is (avgDot / |u|^2)u.
      const uLengthSquared = dot(u, u);

      const point = {
        x: (avgDot / uLengthSquared) * u.x,
        y: (avgDot / uLengthSquared) * u.y
      };

      const tangent = {
        x: -u.y,
        y: u.x
      };

      const tangentLength = Math.hypot(tangent.x, tangent.y);
      const tangentUnit = {
        x: tangent.x / tangentLength,
        y: tangent.y / tangentLength
      };

      const span = Math.max(canvas.clientWidth, canvas.clientHeight) / scale * 1.5;

      const p1 = {
        x: point.x - tangentUnit.x * span,
        y: point.y - tangentUnit.y * span
      };

      const p2 = {
        x: point.x + tangentUnit.x * span,
        y: point.y + tangentUnit.y * span
      };

      const s1 = planeToScreen(p1);
      const s2 = planeToScreen(p2);
      const anchor = planeToScreen(point);

      ctx.save();

      ctx.strokeStyle = getCss("--contour");
      ctx.lineWidth = 3;
      ctx.setLineDash([10, 8]);
      ctx.beginPath();
      ctx.moveTo(s1.x, s1.y);
      ctx.lineTo(s2.x, s2.y);
      ctx.stroke();

      // Also draw a light tolerance band where u·v is within ±0.1 of avgDot.
      const tolerance = 0.1;
      ctx.strokeStyle = "rgba(232, 121, 249, 0.35)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 8]);

      for (const offset of [-tolerance, tolerance]) {
        const shiftedPoint = {
          x: ((avgDot + offset) / uLengthSquared) * u.x,
          y: ((avgDot + offset) / uLengthSquared) * u.y
        };

        const q1 = {
          x: shiftedPoint.x - tangentUnit.x * span,
          y: shiftedPoint.y - tangentUnit.y * span
        };

        const q2 = {
          x: shiftedPoint.x + tangentUnit.x * span,
          y: shiftedPoint.y + tangentUnit.y * span
        };

        const sq1 = planeToScreen(q1);
        const sq2 = planeToScreen(q2);

        ctx.beginPath();
        ctx.moveTo(sq1.x, sq1.y);
        ctx.lineTo(sq2.x, sq2.y);
        ctx.stroke();
      }

      ctx.setLineDash([]);
      ctx.fillStyle = getCss("--contour");
      ctx.beginPath();
      ctx.arc(anchor.x, anchor.y, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.font = "bold 15px system-ui";
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      ctx.fillText(`u·v = avg = ${avgDot.toFixed(2)}`, anchor.x + 8, anchor.y - 8);

      ctx.restore();
    }

    function normalize(v) {
      const length = Math.hypot(v.x, v.y);
      if (length < 1e-9) return { x: 1, y: 0 };
      return { x: v.x / length, y: v.y / length };
    }

    function getUVector() {
      const uDirection = normalize(mousePlane);

      // This is the actual u used for drawing and dot products.
      // Example: at 45 degrees, uDirection = (1/sqrt(2), 1/sqrt(2)),
      // so u = sqrt(2) * uDirection = (1, 1).
      return {
        x: Math.SQRT2 * uDirection.x,
        y: Math.SQRT2 * uDirection.y
      };
    }

    function dot(v1, v2) {
      return v1.x * v2.x + v1.y * v2.y;
    }

    function drawReadout() {
      const width = canvas.clientWidth;
      const u = getUVector();
      const ua = dot(u, vectors.a);
      const ub = dot(u, vectors.b);
      const avg = (ua + ub) / 2;

      ctx.fillStyle = "rgba(3, 7, 18, 0.78)";
      ctx.fillRect(12, 12, 350, 150);

      ctx.fillStyle = getCss("--text");
      ctx.font = "14px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";

      ctx.fillText(`u = (${u.x.toFixed(2)}, ${u.y.toFixed(2)}), |u|=${Math.hypot(u.x, u.y).toFixed(2)}`, 24, 24);
      ctx.fillText(`a = (${vectors.a.x.toFixed(2)}, ${vectors.a.y.toFixed(2)})`, 24, 48);
      ctx.fillText(`b = (${vectors.b.x.toFixed(2)}, ${vectors.b.y.toFixed(2)})`, 24, 72);
      ctx.fillText(`u·a = ${ua.toFixed(3)}`, 24, 96);
      ctx.fillText(`u·b = ${ub.toFixed(3)}`, 24, 120);
      ctx.fillText(`avg = (u·a + u·b)/2 = ${avg.toFixed(3)}`, 24, 144);

      ctx.fillStyle = getCss("--muted");
      ctx.textAlign = "right";
      ctx.fillText("Click a/b endpoint, then click new endpoint", width - 18, 18);
    }

    function draw() {
      drawGrid();

      const u = getUVector();
      const ua = dot(u, vectors.a);
      const ub = dot(u, vectors.b);
      const avgDot = (ua + ub) / 2;

      drawAverageDotContour(u, avgDot);
      drawArrow({ x: 0, y: 0 }, u, getCss("--unit"), "u");

      for (const key of Object.keys(vectors)) {
        drawArrow(
          { x: 0, y: 0 },
          vectors[key],
          vectors[key].color,
          vectors[key].label,
          selectedVector === key
        );
      }

      drawReadout();
    }

    function hitTestVectorEndpoint(screenPoint) {
      for (const key of Object.keys(vectors)) {
        const endpoint = planeToScreen(vectors[key]);
        const distance = Math.hypot(screenPoint.x - endpoint.x, screenPoint.y - endpoint.y);
        if (distance <= 16) return key;
      }
      return null;
    }

    canvas.addEventListener("mousemove", (event) => {
      mousePlane = screenToPlane(getMousePosition(event));
      draw();
    });

    canvas.addEventListener("click", (event) => {
      const screenPoint = getMousePosition(event);
      const hit = hitTestVectorEndpoint(screenPoint);

      if (selectedVector) {
        if (hit === selectedVector) {
          selectedVector = null;
        } else {
          vectors[selectedVector] = {
            ...vectors[selectedVector],
            ...screenToPlane(screenPoint)
          };
          selectedVector = null;
        }
      } else if (hit) {
        selectedVector = hit;
      }

      statusEl.textContent = `Selected: ${selectedVector ?? "none"}`;
      draw();
    });

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
